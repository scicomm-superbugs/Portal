<!DOCTYPE html>
<html>
<body style="background: white; margin: 0; padding: 50px;">
  <div style="mix-blend-mode: difference; background: white; color: black; padding: 20px; border-radius: 8px;">
    <h2>This div uses mix-blend-mode: difference</h2>
    <p>Black text becomes white. White background becomes black.</p>
    <span>🚀👍🔴</span>
  </div>
</body>
</html>
